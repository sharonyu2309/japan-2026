<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 日本中部北陸 櫻花獨旅全攻略</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #D6336C; --secondary: #4A90E2; --bg: #F8F9FA; --card-bg: #FFFFFF; --text: #333; --border: #e0e0e0;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }
        
        .top-bar { background: #2C3E50; color: white; padding: 10px 20px; text-align: center; font-size: 0.85em; }
        .top-bar a { color: #82CCDD; text-decoration: none; margin: 0 4px; font-weight: bold; border: 1px solid #82CCDD; border-radius: 4px; padding: 3px 8px; transition: 0.2s; display: inline-block; margin-top:5px;}
        .top-bar a:hover { background: #82CCDD; color: #2C3E50; }

        header { background: linear-gradient(135deg, var(--primary), #ffb7c5); color: white; padding: 25px; text-align: center; }
        header h1 { margin: 0; font-size: 1.8em; }

        .tab-container { display: flex; justify-content: center; background: white; border-bottom: 2px solid var(--border); position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .tab-btn { background: none; border: none; padding: 15px 25px; font-size: 1.05em; font-weight: bold; color: #666; cursor: pointer; transition: 0.3s; border-bottom: 3px solid transparent; }
        .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }

        .page { display: none; padding: 20px; max-width: 1250px; margin: 0 auto; }
        .page.active { display: block; }

        table { width: 100%; background: white; border-collapse: collapse; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-radius: 8px; overflow: hidden; margin-top: 10px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid var(--border); font-size: 0.95em; }
        th { background-color: #FFF0F2; color: var(--primary); white-space: nowrap; }
        tr.day-row { background-color: #fce4ec; font-weight: bold; color: var(--primary); font-size: 1.1em; }
        .map-link { color: var(--secondary); text-decoration: none; font-weight: bold; }
        
        .db-container { display: flex; gap: 20px; }
        .sidebar { width: 280px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); height: fit-content; position: sticky; top: 75px; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; width: 100%; }
        .card { background: var(--card-bg); border-radius: 10px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); border-left: 5px solid var(--secondary); display: flex; flex-direction: column; }
        .tag { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 0.8em; font-weight: bold; margin-right: 5px; margin-bottom: 8px; background: #eee; }
        .info-list { list-style: none; padding: 0; margin: 0 0 15px 0; font-size: 0.9em; color: #555; flex-grow: 1;}
        .info-list li { margin-bottom: 6px; padding-left: 20px; position: relative; }
        .info-list li::before { content: '▪'; position: absolute; left: 0; color: var(--primary); font-weight: bold; }

        .acc-table select, .acc-table input { width: 95%; padding: 6px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.9em; }
        .sum-card { flex: 1; background: #FFF0F2; padding: 15px; border-radius: 10px; text-align: center; border: 1px solid var(--primary); margin-top: 15px; }
        
        /* 折疊記帳區塊設計 */
        .day-group { background: white; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 15px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .day-header { background: #f8f9fa; padding: 15px 20px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; cursor: pointer; border-bottom: 1px solid transparent; transition: background 0.2s; }
        .day-header:hover { background: #f1f1f1; }
        .day-header.open { border-bottom-color: var(--border); background: #FFF0F2; }
        .day-content { display: none; padding: 15px; }
        .day-content.open { display: block; }
        .day-summary { color: var(--primary); font-size: 0.95em; }

        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } .sidebar { width: auto; position: static; } .db-container { flex-direction: column; } .day-header { flex-direction: column; align-items: flex-start; gap: 5px; } }
    </style>
</head>
